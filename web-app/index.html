<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribal Language Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .language-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: #667eea;
            color: white;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        .voice-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .text-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .response-box {
            background: #f7fafc;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            display: none;
        }

        .response-box.show {
            display: block;
        }

        .response-text {
            color: #333;
            line-height: 1.6;
        }

        .news-feed {
            display: grid;
            gap: 15px;
        }

        .news-item {
            background: #f7fafc;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .news-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .news-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .news-content {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .news-meta {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status.info {
            background: #bee3f8;
            color: #2c5282;
        }

        .recording {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Tribal Language Assistant</h1>
            <p>Voice & Text Support for Tribal Communities</p>
        </div>

        <div class="content">
            <!-- Language Selection -->
            <div class="section">
                <div class="section-title">🗣️ Select Your Language</div>
                <div class="language-selector" id="languageSelector">
                    <button class="lang-btn active" data-lang="santali">Santali (संताली)</button>
                    <button class="lang-btn" data-lang="gondi">Gondi (गोंडी)</button>
                    <button class="lang-btn" data-lang="bhili">Bhili (भीली)</button>
                    <button class="lang-btn" data-lang="kurukh">Kurukh (कुड़ुख)</button>
                    <button class="lang-btn" data-lang="munda">Munda (मुंडा)</button>
                    <button class="lang-btn" data-lang="khasi">Khasi (खासी)</button>
                    <button class="lang-btn" data-lang="mizo">Mizo (मिज़ो)</button>
                    <button class="lang-btn" data-lang="bodo">Bodo (बोडो)</button>
                    <button class="lang-btn" data-lang="hindi">Hindi (हिंदी)</button>
                    <button class="lang-btn" data-lang="english">English</button>
                </div>
            </div>

            <!-- Language Detection -->
            <div class="section">
                <div class="section-title">🔍 Auto Language Detection</div>
                <div class="voice-section">
                    <div class="input-group">
                        <textarea class="text-input" id="detectInput"
                            placeholder="Paste some tribal text here to detect its language..." rows="2"></textarea>
                    </div>
                    <div class="input-group">
                        <button class="btn btn-secondary" id="detectBtn">Identify Language</button>
                        <div id="detectionResult"
                            style="margin-left: 10px; display: flex; align-items: center; font-weight: 600; color: #667eea;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Voice Assistant -->
            <div class="section">
                <div class="section-title">🎤 Voice & Text Assistant</div>
                <div class="status" id="status"></div>
                <div class="voice-section">
                    <div class="input-group">
                        <input type="text" class="text-input" id="questionInput"
                            placeholder="Type your question here...">
                        <button class="btn btn-primary" id="askBtn">Ask</button>
                    </div>
                    <div class="input-group">
                        <button class="btn btn-secondary" id="voiceBtn">🎤 Start Voice Input</button>
                        <button class="btn btn-primary" id="speakBtn" disabled>🔊 Speak Answer</button>
                    </div>
                    <div class="response-box" id="responseBox">
                        <div class="response-text" id="responseText"></div>
                    </div>
                </div>
            </div>

            <!-- News Feed -->
            <div class="section">
                <div class="section-title">📰 Latest News</div>
                <div class="news-feed" id="newsFeed">
                    <div class="news-item">
                        <div class="news-title">Loading news...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
